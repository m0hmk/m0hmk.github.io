<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MohitXplore | Research Archives</title>
    <style>
        /* Base Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Smooth Scrolling for the "Scroll to Explore" button */
        html {
            scroll-behavior: smooth; 
        }

        :root {
            --bg-color: #0a192f;
            --text-main: #f4f4f4;
            --text-muted: #8892b0;
            --accent: #d4af37;
            --card-bg: #112240;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden; 
        }

        /* Hero Banner Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center;
            padding: 20px;
            
            background-image: linear-gradient(rgba(10, 25, 47, 0.85), rgba(10, 25, 47, 1)), url('images/banner.png');
            background-size: contain; 
            background-position: center; 
            background-repeat: no-repeat;
        }

        .logo-img {
            max-width: 250px; 
            height: auto;
            margin-bottom: 10px;
        }

        /* --- Hero Entry Animations --- */
        .observe-hero-title {
            font-size: 2.2rem;
            color: var(--text-main);
            margin-bottom: 15px;
            letter-spacing: 2px;
            filter: blur(12px); 
            opacity: 0; 
            transform: scale(0.95);
            /* Fast reset when scrolling away */
            transition: filter 0.4s ease-out, opacity 0.4s ease-out, transform 0.4s ease-out;
        }
        .show-hero.observe-hero-title {
            /* 0s delay + 1.2s duration = 1.2s total */
            transition: filter 1.2s ease-out, opacity 1.2s ease-out, transform 1.2s ease-out;
        }

        .observe-hero-text {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            opacity: 0; 
            transform: translateY(20px) scale(0.95);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }
        .show-hero.observe-hero-text {
            /* 0.4s delay + 0.8s duration = 1.2s total */
            transition: opacity 0.8s ease-out 0.4s, transform 0.8s ease-out 0.4s;
        }

        .observe-hero-btn {
            margin-top: 40px;
            opacity: 0; 
            transform: translateY(20px) scale(0.95);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }
        .show-hero.observe-hero-btn {
            /* 0.7s delay + 0.5s duration = 1.2s total */
            transition: opacity 0.5s ease-out 0.7s, transform 0.5s ease-out 0.7s;
        }

        /* Classes added by JS to trigger Hero elements */
        .show-hero {
            filter: blur(0); 
            opacity: 1; 
            transform: translateY(0) scale(1);
        }
        /* ------------------------------ */

        /* Scroll Down Indicator Bounce */
        .scroll-indicator {
            font-size: 0.9rem;
            color: var(--accent);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* Timeline / Research Archive Section */
        .archive-section {
            padding: 80px 20px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
            color: var(--text-main);
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        /* --- Scroll Animation Classes --- */
        
        /* Heading Animation Base */
        .hidden-blur {
            filter: blur(10px);
            opacity: 0;
            transition: filter 0.4s ease-out, opacity 0.4s ease-out;
        }
        
        /* Heading Animation Active: 0s delay + 1.0s duration = 1.0s total */
        .show-element.hidden-blur {
            transition: filter 1.0s ease-out, opacity 1.0s ease-out;
        }

        /* Card Animation Base */
        .hidden-lift {
            opacity: 0;
            transform: translateY(40px) scale(0.90);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }

        /* Shared class applied by JS when in view */
        .show-element {
            filter: blur(0);
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Card 1: 0.3s delay + 0.7s duration = 1.0s total */
        .show-element.hidden-lift.delay-1 {
            transition: opacity 0.7s ease-out 0.3s, transform 0.7s ease-out 0.3s;
        }
        
        /* Card 2: 0.5s delay + 0.5s duration = 1.0s total */
        .show-element.hidden-lift.delay-2 {
            transition: opacity 0.5s ease-out 0.5s, transform 0.5s ease-out 0.5s;
        }
        /* -------------------------------- */

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .month-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-main);
            border-left: 4px solid transparent;
            transition: background-color 0.3s ease, border-color 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-card:hover {
            border-left: 4px solid var(--accent);
            background-color: #1a365d; 
        }

        .month-title {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .month-summary {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
        }

        .arrow {
            font-size: 1.5rem;
            color: var(--accent);
            transition: transform 0.3s ease;
        }

        .month-card:hover .arrow {
            transform: translateX(5px);
        }

        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid #112240;
        }
    </style>
</head>
<body>

    <header class="hero">
        <img src="images/logo.png" alt="MohitXplore Logo" class="logo-img">
        <h1 class="observe-hero-title">MohitXplore Research</h1>
        <p class="observe-hero-text">Exploring Computing Logic, Artificial Intelligence, and Digital Philosophy.</p>
        
        <div class="observe-hero-btn">
            <a href="#archives" class="scroll-indicator">Scroll to Explore ↓</a>
        </div>
    </header>

    <main id="archives" class="archive-section">
        <h2 class="section-title hidden-blur">Research Timeline</h2>

        <div class="timeline">
            <a href="april-2026/index" class="month-card hidden-lift delay-1">
                <div>
                    <div class="month-title">April 2026</div>
                    <div class="month-summary">Zero to Infinity</div>
                </div>
                <div class="arrow">»</div>
            </a>

            <a href="march-2026/index" class="month-card hidden-lift delay-2">
                <div>
                    <div class="month-title">March 2026</div>
                    <div class="month-summary">Zero to Infinity</div>
                </div>
                <div class="arrow">»</div>
            </a>
        </div>
    </main>

    <footer>
        &copy; 2026 Mohit. All rights reserved.
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        entry.target.classList.add('show-element', 'show-hero');
                    } else {
                        entry.target.classList.remove('show-element', 'show-hero');
                    }
                });
            }, { 
                threshold: 0.1 
            });

            const hiddenElements = document.querySelectorAll('.hidden-blur, .hidden-lift, .observe-hero-title, .observe-hero-text, .observe-hero-btn');
            hiddenElements.forEach((el) => observer.observe(el));
        });
    </script>

</body>
</html>
