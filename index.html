<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MohitXplore | Research Archives</title>
    <style>
        /* Base Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Smooth Scrolling for the "Scroll to Explore" button */
        html {
            scroll-behavior: smooth; 
        }

        :root {
            --bg-color: #0a192f;
            --text-main: #f4f4f4;
            --text-muted: #8892b0;
            --accent: #d4af37;
            --card-bg: #112240;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden; /* Prevents side-scrolling during animations */
        }

        /* Hero Banner Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            /* Changed to flex-start and added padding-top to lift the logo higher */
            justify-content: flex-start; 
            align-items: center;
            text-align: center;
            padding: 15vh 20px 40px 20px;
            
            /* Adjusted background to prevent severe cutting */
            background-image: linear-gradient(rgba(10, 25, 47, 0.85), rgba(10, 25, 47, 1)), url('images/banner.png');
            background-size: cover;
            background-position: center top; /* Focuses on the top/center of the image */
            background-repeat: no-repeat;
        }

        .logo-img {
            max-width: 250px; /* Slightly smaller to fit the new text underneath */
            height: auto;
            margin-bottom: 10px;
        }

        /* Initial Load Blur Animation for Hero Title */
        @keyframes blurIn {
            0% { filter: blur(12px); opacity: 0; transform: scale(0.95); }
            100% { filter: blur(0); opacity: 1; transform: scale(1); }
        }

        .hero-title {
            font-size: 2.2rem;
            color: var(--text-main);
            margin-bottom: 15px;
            letter-spacing: 2px;
            /* Applies the blur animation when the page opens */
            animation: blurIn 1.5s ease-out forwards;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: auto; /* Pushes the scroll indicator to the bottom */
        }

        /* Scroll Down Indicator */
        .scroll-indicator {
            font-size: 0.9rem;
            color: var(--accent);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
            margin-top: 40px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* Timeline / Research Archive Section */
        .archive-section {
            padding: 80px 20px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
            color: var(--text-main);
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        /* --- Scroll Animation Classes --- */
        /* These hide the elements initially, and the JS reveals them */
        .hidden-blur {
            filter: blur(10px);
            opacity: 0;
            transition: filter 1s ease-out, opacity 1s ease-out;
        }

        .hidden-lift {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        /* The JS adds this class when the element comes into view */
        .show-element {
            filter: blur(0);
            opacity: 1;
            transform: translateY(0);
        }
        /* -------------------------------- */

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .month-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-main);
            border-left: 4px solid transparent;
            transition: background-color 0.3s ease, border-color 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-card:hover {
            border-left: 4px solid var(--accent);
            background-color: #1a365d; 
        }

        .month-title {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .month-summary {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
        }

        .arrow {
            font-size: 1.5rem;
            color: var(--accent);
            transition: transform 0.3s ease;
        }

        .month-card:hover .arrow {
            transform: translateX(5px);
        }

        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid #112240;
        }
    </style>
</head>
<body>

    <header class="hero">
        <img src="images/logo.png" alt="MohitXplore Logo" class="logo-img">
        <h1 class="hero-title">MohitXplore Research</h1>
        <p>Exploring Computing Logic, Artificial Intelligence, and Digital Philosophy.</p>
        <a href="#archives" class="scroll-indicator">Scroll to Explore ↓</a>
    </header>

    <main id="archives" class="archive-section">
        <h2 class="section-title hidden-blur">Research Timeline</h2>

        <div class="timeline">
            <a href="april-2026/index.html" class="month-card hidden-lift">
                <div>
                    <div class="month-title">April 2026</div>
                    <div class="month-summary">Zero to Infinity: AI Roadmaps</div>
                </div>
                <div class="arrow">»</div>
            </a>

            <a href="march-2026/index.html" class="month-card hidden-lift" style="transition-delay: 0.2s;">
                <div>
                    <div class="month-title">March 2026</div>
                    <div class="month-summary">Zero to Infinity: Logic Gates & Adders</div>
                </div>
                <div class="arrow">»</div>
            </a>
        </div>
    </main>

    <footer>
        &copy; 2026 Mohit. All rights reserved.
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Create a sensor (Intersection Observer)
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    // If the element is visible on the screen...
                    if(entry.isIntersecting) {
                        // Add the 'show-element' class to run the animation
                        entry.target.classList.add('show-element');
                        // Stop observing once it has animated
                        observer.unobserve(entry.target); 
                    }
                });
            }, { 
                // Triggers when 10% of the element is visible
                threshold: 0.1 
            });

            // Tell the sensor to watch all elements with these classes
            const hiddenElements = document.querySelectorAll('.hidden-blur, .hidden-lift');
            hiddenElements.forEach((el) => observer.observe(el));
        });
    </script>

</body>
</html>
