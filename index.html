<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MohitXplore | Research Archives</title>
    <style>
        /* Base Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-color: #0a192f; /* Deep Navy Blue */
            --text-main: #f4f4f4;
            --text-muted: #8892b0; /* Slightly blue-tinted muted text */
            --accent: #d4af37; /* Cinematic gold/amber accent */
            --card-bg: #112240; /* Slightly lighter navy for the month cards */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Hero Banner Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Navy Blue Gradient Overlay + Banner Image */
            background: linear-gradient(rgba(10, 25, 47, 0.8), rgba(10, 25, 47, 1)), 
                        url('images/banner.png') center/cover;
            padding: 20px;
        }

        /* Logo Styling */
        .logo-img {
            max-width: 300px; /* Adjust this to change logo size */
            height: auto;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 40px;
        }

        /* Scroll Down Indicator */
        .scroll-indicator {
            font-size: 0.9rem;
            color: var(--accent);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* Timeline / Research Archive Section */
        .archive-section {
            padding: 80px 20px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
            color: var(--text-main);
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        /* Month Cards Layout */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .month-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-main);
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-card:hover {
            border-left: 4px solid var(--accent);
            background-color: #1a365d; /* Lighter navy hover state */
            transform: translateX(10px);
        }

        .month-title {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .month-summary {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
        }

        .arrow {
            font-size: 1.5rem;
            color: var(--accent);
            transition: transform 0.3s ease;
        }

        .month-card:hover .arrow {
            transform: translateX(5px);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid #112240;
        }
    </style>
</head>
<body>

    <header class="hero">
        <img src="images/logo.png" alt="MohitXplore Logo" class="logo-img">
        <p>Exploring Computing Logic, Artificial Intelligence, and Digital Philosophy.</p>
        <a href="#archives" class="scroll-indicator">Scroll to Explore ↓</a>
    </header>

    <main id="archives" class="archive-section">
        <h2 class="section-title">Research Timeline</h2>

        <div class="timeline">
            <a href="april-2026/index.html" class="month-card">
                <div>
                    <div class="month-title">April 2026</div>
                    <div class="month-summary">Current Research & AI Roadmaps</div>
                </div>
                <div class="arrow">»</div>
            </a>

            <a href="march-2026/index.html" class="month-card">
                <div>
                    <div class="month-title">March 2026</div>
                    <div class="month-summary">Zero to Infinity: Logic Gates & Adders</div>
                </div>
                <div class="arrow">»</div>
            </a>
        </div>
    </main>

    <footer>
        &copy; 2026 Mohit. All rights reserved.
    </footer>

</body>
</html>
