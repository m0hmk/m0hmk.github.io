<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March 2026 | MohitXplore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --bg-color: #0a192f;
            --text-main: #f4f4f4;
            --text-muted: #8892b0;
            --accent: #d4af37;
            --card-bg: #112240;
        }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .back-link { color: var(--accent); text-decoration: none; font-size: 1.1rem; display: inline-block; margin-bottom: 30px; }
        .back-link:hover { text-decoration: underline; }
        h1 { font-size: 2.5rem; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 40px; }
        .video-list { display: flex; flex-direction: column; gap: 15px; }
        .video-link {
            background-color: var(--card-bg); padding: 20px; border-radius: 8px; text-decoration: none; color: var(--text-main);
            border-left: 4px solid transparent; transition: all 0.3s ease; display: block; font-size: 1.2rem; font-weight: bold;
        }
        .video-link:hover { border-left: 4px solid var(--accent); background-color: #1a365d; transform: translateX(10px); }
        .series-tag { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px;}
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← Back to Timeline</a>
        <h1>March 2026 Archive</h1>
        
        <div class="video-list">
            <a href="nand-gate-script" class="video-link">
                <span class="series-tag">ZERO TO INFINITY</span>
                The Single Gate That Builds Supercomputers 😲
            </a>
            </div>
    </div>
</body>
</html>
