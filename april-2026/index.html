<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April 2026 | MohitXplore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --bg-color: #0a192f;
            --text-main: #f4f4f4;
            --text-muted: #8892b0;
            --accent: #d4af37;
            --card-bg: #112240;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            line-height: 1.6; 
            padding: 40px 20px; 
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
        }
        .back-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-size: 1.1rem; 
            display: inline-block; 
            margin-bottom: 30px; 
        }
        .back-link:hover { 
            text-decoration: underline; 
        }
        h1 { 
            font-size: 2.5rem; 
            border-bottom: 1px solid #112240; 
            padding-bottom: 20px; 
            margin-bottom: 40px; 
        }
        
        /* Research In Progress Card */
        .progress-card {
            background-color: var(--card-bg);
            padding: 60px 20px;
            border-radius: 12px;
            text-align: center;
            border: 2px dashed #1a365d;
        }
        
        .gear-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: inline-block;
            /* Creates a slow, continuous spin effect */
            animation: spin 4s linear infinite; 
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .progress-title {
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .progress-text {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← Back to Timeline</a>
        
        <h1>April 2026 Archive</h1>
        
        <div class="progress-card">
            <div class="gear-icon">⚙️</div>
            <h2 class="progress-title">Research in Progress</h2>
            <p class="progress-text">Current research and AI roadmaps are currently being structured. Check back soon for new content!</p>
        </div>
    </div>
</body>
</html>
